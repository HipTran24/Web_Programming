databases:
  - name: synaplearn-db
    plan: free
    region: singapore
    databaseName: mydb
    user: synaplearn

services:
  - type: web
    name: synaplearn-web
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: "true"
      - key: AllowedHosts
        value: "*"
      - key: DatabaseProvider
        value: PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: synaplearn-db
          property: connectionString
      - key: Jwt__Issuer
        value: WedProject
      - key: Jwt__Audience
        value: WedProjectClient
      - key: Jwt__UseAsymmetric
        value: "false"
      - key: Jwt__AutoGenerateDevelopmentKey
        value: "false"
      - key: Jwt__SecretKey
        generateValue: true
      - key: GoogleAuth__ClientId
        sync: false
      - key: Groq__GroqApiKey
        sync: false
      - key: Gemini__ApiKey
        sync: false
      - key: Smtp__Host
        sync: false
      - key: Smtp__Port
        value: "587"
      - key: Smtp__EnableSsl
        value: "true"
      - key: Smtp__Username
        sync: false
      - key: Smtp__Password
        sync: false
      - key: Smtp__FromEmail
        value: no-reply@synaplearn.local
      - key: Smtp__FromName
        value: SynapLearn
