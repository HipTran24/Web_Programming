<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Đăng nhập — AI Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b1220;
        --border: rgba(255, 255, 255, 0.14);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.72);
        --muted-2: rgba(255, 255, 255, 0.5);
        --radius: 18px;
        --blue: #1a7ef7;
        --blue-bg: rgba(13, 110, 253, 0.16);
        --blue-border: rgba(13, 110, 253, 0.35);
      }

      html,
      body {
        height: 100%;
        font-family: "Inter", sans-serif;
        color: var(--text);
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background:
          radial-gradient(
            900px 600px at 10% 10%,
            rgba(13, 110, 253, 0.22),
            transparent 55%
          ),
          radial-gradient(
            900px 600px at 90% 10%,
            rgba(25, 135, 84, 0.18),
            transparent 55%
          ),
          radial-gradient(
            900px 700px at 40% 90%,
            rgba(220, 53, 69, 0.14),
            transparent 60%
          ),
          var(--bg);
      }

      /* ===== PAGE LOADER ===== */
      #page-loader.logo-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
          radial-gradient(
            circle at center,
            rgba(13, 110, 253, 0.16),
            transparent 28%
          ),
          #0b1220;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #page-loader.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .logo-loader-box {
        position: relative;
        width: 280px;
        height: 280px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .ai-logo-core {
        position: relative;
        width: 95px;
        height: 95px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0d6efd, #5aa2ff);
        box-shadow:
          0 0 18px rgba(13, 110, 253, 0.55),
          0 0 45px rgba(13, 110, 253, 0.28);
        animation: corePulse 2s ease-in-out infinite;
        z-index: 2;
      }

      .ai-logo-core span {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: 1px;
      }

      .ai-orbit {
        position: absolute;
        border: 1.5px solid rgba(255, 255, 255, 0.18);
        border-radius: 50%;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
      }

      .orbit-1 {
        width: 150px;
        height: 150px;
        animation-name: orbitSpin;
        animation-duration: 4s;
      }

      .orbit-2 {
        width: 210px;
        height: 210px;
        animation-name: orbitSpinReverse;
        animation-duration: 6s;
      }

      .orbit-1::before,
      .orbit-2::before {
        content: "";
        position: absolute;
        top: -6px;
        left: 50%;
        transform: translateX(-50%);
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 14px rgba(255, 255, 255, 0.6);
      }

      .logo-loader-box h4 {
        margin-top: 28px;
        margin-bottom: 8px;
        color: #fff;
        font-weight: 700;
      }

      .logo-loader-box p {
        margin: 0;
        color: rgba(255, 255, 255, 0.66);
        text-align: center;
        font-size: 0.95rem;
        max-width: 240px;
      }

      /* ===== PAGE CONTENT EFFECT ===== */
      .page-content {
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }

      .page-content.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* NAVBAR */
      nav {
        padding: 18px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(10, 14, 26, 0.5);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(10px);
      }

      .brand {
        font-weight: 800;
        font-size: 1.2rem;
        color: var(--text);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .brand-dot {
        width: 7px;
        height: 7px;
        background: var(--blue);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.4);
          opacity: 0.7;
        }
      }

      .btn-nav {
        padding: 9px 20px;
        border-radius: 100px;
        font-size: 0.85rem;
        font-weight: 500;
        text-decoration: none;
        border: 1px solid var(--border);
        color: var(--muted);
        background: transparent;
        transition: all 0.2s;
      }

      .btn-nav:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.07);
      }

      /* MAIN */
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
      }

      .auth-wrap {
        width: 100%;
        max-width: 440px;
        animation: fadeUp 0.5s ease both;
      }

      /* CARD */
      .auth-card {
        background: rgba(30, 41, 59, 0.95);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 40px 36px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        position: relative;
        overflow: hidden;
      }

      .auth-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: var(--blue-bg);
        border: 1px solid var(--blue-border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        margin-bottom: 20px;
      }

      .auth-title {
        font-weight: 700;
        font-size: 1.5rem;
        color: var(--text);
        margin-bottom: 6px;
        letter-spacing: -0.02em;
      }

      .auth-sub {
        font-size: 0.875rem;
        color: var(--muted);
        margin-bottom: 28px;
      }

      /* FORM */
      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .form-input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .form-input::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }

      .form-input:focus {
        border-color: rgba(13, 110, 253, 0.6);
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
      }

      .form-input.error {
        border-color: rgba(220, 53, 69, 0.6);
      }

      .form-input.error:focus {
        box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.15);
      }

      .input-wrapper {
        position: relative;
      }

      .input-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--muted-2);
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        transition: color 0.2s;
      }

      .input-toggle:hover {
        color: var(--text);
      }

      .form-error {
        font-size: 0.78rem;
        color: #f87171;
        margin-top: 6px;
        display: none;
      }

      .form-error.show {
        display: block;
      }

      .form-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .checkbox-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.83rem;
        color: var(--muted);
        cursor: pointer;
      }

      .checkbox-wrap input[type="checkbox"] {
        width: 15px;
        height: 15px;
        accent-color: var(--blue);
        cursor: pointer;
      }

      .forgot-link {
        font-size: 0.83rem;
        color: rgba(77, 159, 255, 0.9);
        text-decoration: none;
        transition: color 0.2s;
      }

      .forgot-link:hover {
        color: #7ab8ff;
        text-decoration: underline;
      }

      /* BUTTON */
      .btn-submit {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #1a7ef7, #0d6efd);
        color: #fff;
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 20px rgba(13, 110, 253, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-submit:hover {
        background: linear-gradient(135deg, #3d8fff, #1a7ef7);
        transform: translateY(-1px);
        box-shadow: 0 8px 28px rgba(13, 110, 253, 0.5);
      }

      .btn-submit:active {
        transform: none;
      }

      /* DIVIDER */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0;
        color: rgba(255, 255, 255, 0.28);
        font-size: 0.78rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }

      /* OAUTH */
      .btn-oauth {
        width: 100%;
        padding: 11px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted);
        font-family: "Inter", sans-serif;
        font-size: 0.88rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-oauth:hover {
        background: rgba(255, 255, 255, 0.09);
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.25);
      }

      /* ALERT */
      .alert {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.85rem;
        margin-bottom: 20px;
        display: none;
        align-items: center;
        gap: 10px;
      }

      .alert.show {
        display: flex;
      }

      .alert-error {
        background: rgba(220, 53, 69, 0.12);
        border: 1px solid rgba(220, 53, 69, 0.3);
        color: #f87171;
      }

      .alert-success {
        background: rgba(25, 135, 84, 0.12);
        border: 1px solid rgba(25, 135, 84, 0.3);
        color: #4ade80;
      }

      /* AUTH FOOTER */
      .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .auth-footer a {
        color: rgba(77, 159, 255, 0.9);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      .auth-footer a:hover {
        color: #7ab8ff;
        text-decoration: underline;
      }

      /* PAGE FOOTER */
      footer {
        padding: 22px 32px;
        text-align: center;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.38);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(6px);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes orbitSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes orbitSpinReverse {
        from {
          transform: rotate(360deg);
        }
        to {
          transform: rotate(0deg);
        }
      }

      @keyframes corePulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
      }
    </style>
  </head>
  <body>
    <div id="page-loader" class="logo-loader">
      <div class="logo-loader-box">
        <div class="ai-orbit orbit-1"></div>
        <div class="ai-orbit orbit-2"></div>
        <div class="ai-logo-core">
          <span>AI</span>
        </div>
        <h4>AI Study</h4>
        <p>Hệ thống học tập thông minh đang khởi động</p>
      </div>
    </div>

    <div class="page-content">
      <nav>
        <a class="brand" href="index.html">
          <div class="brand-dot"></div>
          AI Study
        </a>
        <a class="btn-nav" href="register.html">Đăng ký</a>
      </nav>

      <main>
        <div class="auth-wrap">
          <div class="auth-card">
            <div class="auth-title">Đăng nhập</div>
            <div class="auth-sub">
              Chào mừng trở lại! Tiếp tục hành trình học tập của bạn.
            </div>

            <div class="alert alert-error" id="alertBox">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
                <circle
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  stroke="currentColor"
                  stroke-width="2"
                  d="M12 8v4M12 16h.01"
                />
              </svg>
              <span id="alertMsg"></span>
            </div>

            <form id="loginForm" novalidate>
              <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input
                  id="email"
                  name="email"
                  class="form-input"
                  type="email"
                  placeholder="name@email.com"
                  autocomplete="email"
                  required
                />
                <div class="form-error" id="emailError"></div>
              </div>

              <div class="form-group">
                <label class="form-label" for="password">Mật khẩu</label>
                <div class="input-wrapper">
                  <input
                    id="password"
                    name="password"
                    class="form-input"
                    type="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                    style="padding-right: 44px"
                  />
                  <button
                    type="button"
                    class="input-toggle"
                    id="togglePwd"
                    aria-label="Hiện/ẩn mật khẩu"
                  >
                    <svg
                      id="eyeIcon"
                      width="18"
                      height="18"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke="currentColor"
                        stroke-width="2"
                        d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                      />
                      <circle
                        cx="12"
                        cy="12"
                        r="3"
                        stroke="currentColor"
                        stroke-width="2"
                      />
                    </svg>
                  </button>
                </div>
                <div class="form-error" id="passwordError"></div>
              </div>

              <div class="form-row">
                <label class="checkbox-wrap">
                  <input type="checkbox" id="remember" name="remember" />
                  Ghi nhớ đăng nhập
                </label>
                <a href="#" class="forgot-link">Quên mật khẩu?</a>
              </div>

              <button type="submit" class="btn-submit">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
                  <path
                    stroke="currentColor"
                    stroke-width="2"
                    d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"
                  />
                </svg>
                Đăng nhập
              </button>
            </form>

            <div class="divider">hoặc</div>

            <button class="btn-oauth">
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path
                  fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                />
                <path
                  fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                />
                <path
                  fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                />
                <path
                  fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                />
              </svg>
              Đăng nhập với Google
            </button>
          </div>

          <div class="auth-footer">
            Chưa có tài khoản? <a href="register.html">Đăng ký miễn phí</a>
          </div>
        </div>
      </main>

      <footer>© 2026 AI Study · Programming Web Project</footer>
    </div>

    <script src="../js/login.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
      // Toggle password visibility
      const togglePwd = document.getElementById("togglePwd");
      const pwdInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");
      togglePwd.addEventListener("click", () => {
        const show = pwdInput.type === "password";
        pwdInput.type = show ? "text" : "password";
        eyeIcon.innerHTML = show
          ? '<path stroke="currentColor" stroke-width="2" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/>'
          : '<path stroke="currentColor" stroke-width="2" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>';
      });

      // Validation
      const form = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const alertBox = document.getElementById("alertBox");
      const alertMsg = document.getElementById("alertMsg");

      const showErr = (el, errEl, msg) => {
        el.classList.add("error");
        errEl.textContent = msg;
        errEl.classList.add("show");
      };

      const clearErr = (el, errEl) => {
        el.classList.remove("error");
        errEl.textContent = "";
        errEl.classList.remove("show");
      };

      emailInput.addEventListener("input", () =>
        clearErr(emailInput, emailError)
      );

      pwdInput.addEventListener("input", () =>
        clearErr(pwdInput, passwordError)
      );

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        let valid = true;
        alertBox.classList.remove("show");

        const emailVal = emailInput.value.trim();
        const pwdVal = pwdInput.value;

        if (!emailVal) {
          showErr(emailInput, emailError, "Vui lòng nhập email.");
          valid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
          showErr(emailInput, emailError, "Email không hợp lệ.");
          valid = false;
        } else clearErr(emailInput, emailError);

        if (!pwdVal) {
          showErr(pwdInput, passwordError, "Vui lòng nhập mật khẩu.");
          valid = false;
        } else if (pwdVal.length < 6) {
          showErr(pwdInput, passwordError, "Mật khẩu tối thiểu 6 ký tự.");
          valid = false;
        } else clearErr(pwdInput, passwordError);

        if (valid) {
          if (typeof handleLogin === "function") {
            handleLogin(emailVal, pwdVal);
          } else {
            alertMsg.textContent = "Đăng nhập thành công! Đang chuyển hướng...";
            alertBox.className = "alert alert-success show";
          }
        }
      });
    </script>
  </body>
</html>
