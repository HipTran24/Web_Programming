<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
        <style id="instant-page-bg">html,body{background:#08131b!important;color:#eef6f7;}</style>
    <script>
      (function () {
        document.documentElement.classList.add("auth-shellless");

        const removeShellArtifacts = () => {
          document.body?.removeAttribute("data-shell-page");
          document.getElementById("app-shell-navbar")?.remove();
          document.getElementById("app-shell-sidebar")?.remove();
          document.getElementById("app-shell-backdrop")?.remove();
          document.querySelectorAll("nav.navbar, #navbar, #appSidebar, .app-sidebar").forEach((node) => {
            node.remove();
          });
        };

        removeShellArtifacts();
        document.addEventListener("DOMContentLoaded", removeShellArtifacts, { once: true });
      })();
    </script>
    <style>
      html.auth-shellless #app-shell-navbar,
      html.auth-shellless #app-shell-sidebar,
      html.auth-shellless #app-shell-backdrop,
      html.auth-shellless nav.navbar,
      html.auth-shellless #navbar,
      html.auth-shellless #appSidebar,
      html.auth-shellless .app-sidebar,
      html.auth-shellless #page-loader.logo-loader,
      html.auth-shellless .logo-loader {
        display: none !important;
      }

      html.auth-shellless body {
        padding-top: 0 !important;
      }

      html.auth-shellless .page-content {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }

      html.auth-shellless [data-shell-page] .page-content,
      html.auth-shellless [data-shell-page] main {
        padding-top: 0 !important;
      }
    </style>
<title>SynapLearn - Đăng nhập</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg?v=20260402-tab3" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=20260402-tab3" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="../css/style.css?v=20260515-noloader" rel="stylesheet" />
    <link href="../css/login.css" rel="stylesheet" />
    <style>
      /* Final guard: browser autofill must keep dark input background */
      html body.page-login .login-card input.floating-input,
      html body.page-login .login-card input.floating-input:hover,
      html body.page-login .login-card input.floating-input:focus,
      html body.page-login .login-card input.floating-input:active,
      html body.page-login .login-card input.floating-input:-webkit-autofill,
      html body.page-login .login-card input.floating-input:-webkit-autofill:hover,
      html body.page-login .login-card input.floating-input:-webkit-autofill:focus,
      html body.page-login .login-card input.floating-input:-webkit-autofill:active,
      html body.page-login .login-card input.floating-input:-internal-autofill-selected {
        background: #16203d !important;
        background-color: #16203d !important;
        background-image: none !important;
        color: #f4f7ff !important;
        -webkit-text-fill-color: #f4f7ff !important;
        caret-color: #f4f7ff !important;
        border-color: rgba(159, 177, 255, 0.28) !important;
        -webkit-box-shadow: 0 0 0 1000px #16203d inset !important;
        box-shadow: 0 0 0 1000px #16203d inset !important;
      }

    </style>
  </head>
  <body class="page-login">
    <div class="page-content">
      <main class="auth-page auth-page--login">
        <div class="container login-shell">
          <section class="login-card" aria-label="Biểu mẫu đăng nhập">
            <header class="login-card-head">
              <h1 class="login-title">Đăng nhập</h1>
              <p class="login-head-sub mb-0">
                Tiếp tục lộ trình học tập của bạn với không gian học tập thông minh và bảo mật.
              </p>
            </header>

            <div class="alert alert-danger d-none" id="alertBox">
              <span id="alertMsg"></span>
            </div>

            <form id="loginForm" class="login-form-grid" novalidate autocomplete="off">
              <div class="field-control">
                <input
                  id="username"
                  name="username"
                  class="floating-input"
                  placeholder=" "
                  maxlength="64"
                  autocomplete="off"
                  autocapitalize="none"
                  autocorrect="off"
                  spellcheck="false"
                  required
                />
                <label class="floating-label" for="username">Tên đăng nhập</label>
                <div class="invalid-feedback" id="usernameError"></div>
              </div>

              <div class="field-control has-toggle">
                <input
                  id="password"
                  name="password"
                  class="floating-input"
                  type="password"
                  placeholder=" "
                  minlength="8"
                  maxlength="128"
                  autocomplete="new-password"
                  required
                />
                <label class="floating-label" for="password">Mật khẩu</label>
                <button
                  type="button"
                  class="btn btn-link password-toggle-btn"
                  id="passwordToggleBtn"
                  aria-label="Hiện hoặc ẩn mật khẩu"
                >
                  <svg id="loginPasswordEyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24">
                    <path
                      stroke="currentColor"
                      stroke-width="2"
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    />
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                  </svg>
                </button>
                <div class="invalid-feedback" id="passwordError"></div>
              </div>

              <div class="login-row-meta">
                <a class="forgot-password-link" href="#">Quên mật khẩu?</a>
              </div>
              <button id="loginButton" type="submit" class="btn btn-primary w-100 login-submit-btn">Đăng nhập</button>

              <div class="auth-divider" role="separator" aria-label="Hoặc đăng nhập bằng tài khoản khác">
                <span>hoặc tiếp tục với</span>
              </div>

              <div id="googleLoginButton" class="google-login-host w-100" aria-label=""></div>
              <div class="text-muted-2 small login-footer-note">
                Chưa có tài khoản?
                <a href="../home/register.html" class="text-white" data-no-ajax="true">Đăng ký</a>
              </div>
            </form>
          </section>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="../js/auth.js"></script>
    <script src="../assets/js/main.js?v=20260515-smoothnav"></script>
    <script src="../js/login.js"></script>
    <script src="../js/app-shell.js?v=20260515-smoothnav"></script>
  </body>
</html>
