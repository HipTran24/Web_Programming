<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
        <style id="instant-page-bg">html,body{background:#08131b!important;color:#eef6f7;}</style>
    <script>
      (function () {
        document.documentElement.classList.add("auth-shellless");

        const removeShellArtifacts = () => {
          document.body?.removeAttribute("data-shell-page");
          document.getElementById("app-shell-navbar")?.remove();
          document.getElementById("app-shell-sidebar")?.remove();
          document.getElementById("app-shell-backdrop")?.remove();
          document.querySelectorAll("nav.navbar, #navbar, #appSidebar, .app-sidebar").forEach((node) => {
            node.remove();
          });
        };

        removeShellArtifacts();
        document.addEventListener("DOMContentLoaded", removeShellArtifacts, { once: true });
      })();
    </script>
    <style>
      html.auth-shellless #app-shell-navbar,
      html.auth-shellless #app-shell-sidebar,
      html.auth-shellless #app-shell-backdrop,
      html.auth-shellless nav.navbar,
      html.auth-shellless #navbar,
      html.auth-shellless #appSidebar,
      html.auth-shellless .app-sidebar {
        display: none !important;
      }

      html.auth-shellless body {
        padding-top: 0 !important;
      }

      html.auth-shellless [data-shell-page] .page-content,
      html.auth-shellless [data-shell-page] main {
        padding-top: 0 !important;
      }
    </style>
<title>SynapLearn - Đăng ký</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg?v=20260402-tab3" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=20260402-tab3" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../css/style.css" rel="stylesheet" />
    <link href="../css/register.css" rel="stylesheet" />
</head>
  <body class="page-register">
    <div id="page-loader" class="logo-loader">
  <div class="logo-loader-box">
    <div class="ai-orbit orbit-1"></div>
    <div class="ai-orbit orbit-2"></div>
    <div class="ai-logo-core">
      <span>AI</span>
    </div>
    <h4>SynapLearn</h4>
    <p>Hệ thống học tập thông minh đang khởi động</p>
  </div>
</div>

<div class="page-content">
<main class="auth-page auth-page--register">
      <div class="container register-shell">
        <section class="register-card register-card--solo" aria-label="Biểu mẫu đăng ký">
            <div class="register-card-head">
              <h1 class="register-title mb-2">Đăng ký</h1>
              <p class="register-head-sub mb-0">Tham gia SynapLearn để học tập tập trung và thông minh hơn mỗi ngày.</p>
            </div>

            <form id="registerForm" class="row g-3 register-form-grid" novalidate>
              <div class="col-12">
                <div class="field-control">
                  <span class="field-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                      <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
                    </svg>
                  </span>
                  <input
                    id="username"
                    name="username"
                    class="floating-input"
                    placeholder=" "
                    maxlength="64"
                    autocomplete="username"
                    required
                  />
                  <label class="floating-label" for="username">Tên đăng nhập</label>
                </div>
                <div class="invalid-feedback" id="usernameError"></div>
              </div>

              <div class="col-12">
                <div class="field-control">
                  <span class="field-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M4 20v-1a7 7 0 0 1 14 0v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                      <circle cx="11" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
                      <path d="M18 7h2m-1-1v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                  </span>
                  <input
                    id="fullName"
                    name="fullName"
                    class="floating-input"
                    placeholder=" "
                    maxlength="128"
                    autocomplete="name"
                    required
                  />
                  <label class="floating-label" for="fullName">Họ và tên</label>
                </div>
                <div class="invalid-feedback" id="fullNameError"></div>
              </div>

              <div class="col-12">
                <div class="field-control">
                  <span class="field-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <rect x="3" y="5" width="18" height="14" rx="3" stroke="currentColor" stroke-width="1.8" />
                      <path d="m4 7.5 7.1 5.2a1.6 1.6 0 0 0 1.9 0L20 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                  </span>
                  <input
                    id="email"
                    name="email"
                    class="floating-input"
                    placeholder=" "
                    type="email"
                    maxlength="256"
                    autocomplete="email"
                    required
                  />
                  <label class="floating-label" for="email">Địa chỉ email</label>
                </div>
                <div class="invalid-feedback" id="emailError"></div>
              </div>

              <div class="col-12">
                <div class="field-control has-toggle">
                  <span class="field-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <rect x="4" y="10" width="16" height="10" rx="3" stroke="currentColor" stroke-width="1.8" />
                      <path d="M8 10V7a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                  </span>
                  <input
                    id="password"
                    name="password"
                    class="floating-input"
                    type="password"
                    placeholder=" "
                    minlength="8"
                    maxlength="128"
                    autocomplete="new-password"
                    required
                  />
                  <label class="floating-label" for="password">Mật khẩu</label>
                  <button
                    type="button"
                    class="btn btn-link password-toggle-btn"
                    id="toggleRegisterPassword"
                    aria-label="Hiện hoặc ẩn mật khẩu"
                  >
                    <svg id="registerPasswordEyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24">
                      <path
                        stroke="currentColor"
                        stroke-width="2"
                        d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                      />
                      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                    </svg>
                  </button>
                </div>
                <div class="register-field-note">Tối thiểu 8 ký tự, nên có chữ và số để tăng bảo mật.</div>
                <div class="invalid-feedback" id="passwordError"></div>
              </div>

              <div class="col-12">
                <div class="field-control has-toggle">
                  <span class="field-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <rect x="4" y="10" width="16" height="10" rx="3" stroke="currentColor" stroke-width="1.8" />
                      <path d="M8 10V7a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                  </span>
                  <input
                    id="confirmPassword"
                    name="confirmPassword"
                    class="floating-input"
                    type="password"
                    placeholder=" "
                    minlength="8"
                    maxlength="128"
                    autocomplete="new-password"
                    required
                  />
                  <label class="floating-label" for="confirmPassword">Nhập lại mật khẩu</label>
                  <button
                    type="button"
                    class="btn btn-link password-toggle-btn"
                    id="toggleRegisterConfirmPassword"
                    aria-label="Hiện hoặc ẩn nhập lại mật khẩu"
                  >
                    <svg id="registerConfirmPasswordEyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24">
                      <path
                        stroke="currentColor"
                        stroke-width="2"
                        d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                      />
                      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                    </svg>
                  </button>
                </div>
                <div class="register-field-note">Nhập lại chính xác mật khẩu để hoàn tất đăng ký.</div>
                <div class="invalid-feedback" id="confirmPasswordError"></div>
              </div>

              <div class="col-12">
                <div class="form-check register-terms register-terms-wrapper">
                  <input class="form-check-input" type="checkbox" id="agree" />
                  <label class="form-check-label" for="agree">
                    Tôi đồng ý với điều khoản sử dụng và chính sách bảo mật
                  </label>
                </div>
                <div class="invalid-feedback d-block" id="acceptTermsError"></div>
              </div>

              <div class="col-12">
                <div id="registerMessage" class="small mb-3 register-message"></div>
                <button id="registerButton" type="submit" class="btn btn-primary w-100 register-submit-btn">
                  Đăng ký
                </button>
                <div class="text-muted-2 small mt-3 register-footer-note">
                  Đã có tài khoản?
                  <a href="../home/login.html" class="text-white">Đăng nhập</a>
                </div>
              </div>
            </form>
        </section>
      </div>
    </main>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/auth.js"></script>
  <script src="../assets/js/main.js"></script>
    <script src="../js/register.js"></script>
    <script src="../js/app-shell.js"></script>
</body>
</html>
