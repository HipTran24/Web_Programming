<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SynapLearn Premium</title>
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const paymentState = String(params.get("payment") || "").trim();
        if (!paymentState && !params.has("checkout")) {
          params.set("checkout", "payos");
        }

        const query = params.toString();
        window.location.replace(`/premium/upgrade.html${query ? `?${query}` : ""}${window.location.hash || ""}`);
      })();
    </script>
  </head>
  <body>
    <noscript>
      <a href="/premium/upgrade.html">Continue to Premium upgrade</a>
    </noscript>
  </body>
</html>
