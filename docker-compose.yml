name: synaplearn

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: ${MSSQL_PID:-Developer}
      SA_PASSWORD: ${DB_SA_PASSWORD:?Set DB_SA_PASSWORD in your Docker env file}
    ports:
      - "${DB_PUBLISH_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      AllowedHosts: ${ALLOWED_HOSTS:-*}
      ConnectionStrings__DefaultConnection: "Server=${DB_HOST:-db},${DB_PORT:-1433};Database=${DB_NAME:-myDB};User Id=${DB_USER:-sa};Password=${DB_SA_PASSWORD};TrustServerCertificate=True;Encrypt=${DB_ENCRYPT:-False};"
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL:-no-reply@synaplearn.local}
      Smtp__FromName: ${SMTP_FROM_NAME:-SynapLearn}
      GoogleAuth__ClientId: ${GOOGLE_AUTH_CLIENT_ID:-}
      Groq__GroqApiKey: ${GROQ_API_KEY:-}
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      Jwt__Issuer: ${JWT_ISSUER:-WedProject}
      Jwt__Audience: ${JWT_AUDIENCE:-WedProjectClient}
      Jwt__UseAsymmetric: ${JWT_USE_ASYMMETRIC:-false}
      Jwt__SecretKey: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY to a strong 32+ char secret}
      Jwt__AutoGenerateDevelopmentKey: ${JWT_AUTO_GENERATE_DEVELOPMENT_KEY:-false}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      Jwt__RememberMeAccessTokenDays: ${JWT_REMEMBER_ME_DAYS:-7}
      AdminAccount__Username: ${ADMIN_ACCOUNT_USERNAME:-}
      AdminAccount__Email: ${ADMIN_ACCOUNT_EMAIL:-}
      AdminAccount__Password: ${ADMIN_ACCOUNT_PASSWORD:-}
      AdminAccount__FullName: ${ADMIN_ACCOUNT_FULL_NAME:-}
    ports:
      - "${WEB_PORT:-8080}:8080"

volumes:
  sqlserver_data:
