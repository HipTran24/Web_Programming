name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_FILE: Wed_Project.sln
  TEST_PROJECT: Wed_Project.Tests/Wed_Project.Tests.csproj
  DEPLOY_PACKAGE: deploy-package.tgz

jobs:
  ci:
    name: Restore, Build, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} -c Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT }} -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
          if-no-files-found: ignore

  docker:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile -t wed-project:ci .

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    environment:
      name: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: deploy_gate
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ENV_DOCKER: ${{ secrets.ENV_DOCKER }}
        run: |
          if [ -n "${DEPLOY_HOST}" ] && [ -n "${DEPLOY_USERNAME}" ] && [ -n "${DEPLOY_SSH_KEY}" ] && [ -n "${DEPLOY_PATH}" ] && [ -n "${ENV_DOCKER}" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy because secrets are missing
        if: steps.deploy_gate.outputs.should_deploy != 'true'
        run: echo "Skipping deployment because one or more deploy secrets are not configured."

      - name: Package application
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=github \
            --exclude=bin \
            --exclude=obj \
            --exclude=Wed_Project.Tests/bin \
            --exclude=Wed_Project.Tests/obj \
            --exclude=.env.docker \
            -czf "${DEPLOY_PACKAGE}" .

      - name: Configure SSH
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          scp -P "$PORT" "${DEPLOY_PACKAGE}" "${DEPLOY_USERNAME}@${DEPLOY_HOST}:/tmp/${DEPLOY_PACKAGE}"

      - name: Create deploy env file
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        env:
          ENV_DOCKER: ${{ secrets.ENV_DOCKER }}
        run: |
          printf '%s' "${ENV_DOCKER}" > .env.docker.deploy

      - name: Upload deploy env file
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          scp -P "$PORT" .env.docker.deploy "${DEPLOY_USERNAME}@${DEPLOY_HOST}:/tmp/.env.docker.deploy"

      - name: Deploy with Docker Compose
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          ssh -p "$PORT" "${DEPLOY_USERNAME}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          mkdir -p "${DEPLOY_PATH}"
          tar -xzf "/tmp/${DEPLOY_PACKAGE}" -C "${DEPLOY_PATH}"
          mv /tmp/.env.docker.deploy "${DEPLOY_PATH}/.env.docker"
          cd "${DEPLOY_PATH}"
          docker compose --env-file .env.docker up -d --build
          rm -f "/tmp/${DEPLOY_PACKAGE}"
          EOF
